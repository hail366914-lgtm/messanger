<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Hail</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .header {
            height: 56px;
            background-color: #222;
            flex-shrink: 0;
        }

        /* ── Main Content ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 80px 30px 0;
            gap: 18px;
        }

        /* ── Input Row ── */
        .input-row {
            width: 100%;
            max-width: 460px;
            display: flex;
            align-items: center;
            background: #444;
            border-radius: 999px;
            padding: 0 20px;
            height: 54px;
            transition: box-shadow .2s;
        }

        .input-row:focus-within {
            box-shadow: 0 0 0 2px #888;
        }

        .input-row svg {
            width: 26px;
            height: 26px;
            flex-shrink: 0;
        }

        .input-row input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 17px;
            margin-left: 14px;
        }

        .input-row input::placeholder {
            color: #aaa;
        }

        /* ── Link "Войти" ── */
        .link-login {
            margin-top: 6px;
            margin-bottom: 20px;
            color: #00bfff;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            background: none;
            border: none;
            transition: opacity .2s;
        }

        .link-login:hover {
            opacity: .75;
        }

        /* ── Button "Продолжить" ── */
        .btn-continue {
            width: 100%;
            max-width: 300px;
            margin-top: auto;
            margin-bottom: 100px;
            background: #444;
            color: #fff;
            font-size: 17px;
            font-weight: 500;
            border: none;
            border-radius: 12px;
            padding: 16px 0;
            cursor: pointer;
            transition: background .2s;
        }

        .btn-continue:hover {
            background: #555;
        }

        .btn-continue:active {
            transform: scale(.98);
        }

        /* ── Footer ── */
        .footer {
            height: 56px;
            background-color: #222;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header"></div>

    <!-- Main -->
    <div class="main">

        <!-- Username -->
        <div class="input-row">
            <svg viewBox="0 0 24 24" fill="#aaa">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
            <input type="text" placeholder="Username" id="username" autocomplete="username">
        </div>

        <!-- Password -->
        <div class="input-row">
            <svg viewBox="0 0 24 24" fill="#aaa">
                <path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65zM7 14c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/>
            </svg>
            <input type="password" placeholder="Пароль" id="password" autocomplete="current-password">
        </div>

        <!-- "Войти" link -->
        <button class="link-login" id="loginBtn">Войти</button>

        <!-- Spacer pushes button down -->
        <div style="flex:1"></div>

        <!-- "Продолжить" button -->
        <button class="btn-continue" id="continueBtn">Продолжить</button>
    </div>

    <!-- Footer -->
    <div class="footer"></div>

    <script>
        document.getElementById('loginBtn').addEventListener('click', () => {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            if (!username || !password) {
                alert('Заполните все поля');
                return;
            }
            alert(`Вход:\nЛогин: ${username}`);
        });

        document.getElementById('continueBtn').addEventListener('click', () => {
            alert('Переход к следующему шагу');
        });

        document.addEventListener('keypress', e => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
    </script>
</body>
</html>
