<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Hail</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Form Container */
        .login-form {
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Logo/Title */
        .app-title {
            text-align: center;
            font-size: 36px;
            font-weight: 700;
            color: #8b5cf6;
            margin-bottom: 20px;
        }

        /* Input Groups */
        .input-group {
            background-color: #2d2d2d;
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        .input-group:focus-within {
            background-color: #3a3a3a;
            box-shadow: 0 0 0 2px #8b5cf6;
        }

        .input-group svg {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }

        .input-group .icon-user {
            fill: #888;
        }

        .input-group .icon-key {
            stroke: #888;
            fill: none;
            stroke-width: 2;
        }

        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 18px 15px;
            color: #ffffff;
            font-size: 18px;
            outline: none;
        }

        .input-group input::placeholder {
            color: #888;
        }

        /* Login Button */
        .login-button {
            background: none;
            border: none;
            color: #00bfff;
            font-size: 18px;
            font-weight: 500;
            padding: 15px;
            cursor: pointer;
            text-align: center;
            transition: color 0.3s ease, transform 0.2s ease;
        }

        .login-button:hover {
            color: #33ccff;
        }

        .login-button:active {
            transform: scale(0.98);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 10px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: #3d3d3d;
        }

        .divider span {
            color: #666;
            font-size: 14px;
        }

        /* Links */
        .links {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }

        .links a {
            color: #8b5cf6;
            text-decoration: none;
            font-size: 15px;
            transition: color 0.3s ease;
        }

        .links a:hover {
            color: #a78bfa;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-form">
        <!-- App Title -->
        <div class="app-title">Hail</div>

        <!-- Username Input -->
        <div class="input-group">
            <svg viewBox="0 0 24 24" class="icon-user">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
            <input type="text" placeholder="Username" id="username">
        </div>

        <!-- Password Input -->
        <div class="input-group">
            <svg viewBox="0 0 24 24" class="icon-key">
                <path d="M7 14c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6c0 1.66-.67 3.16-1.76 4.24L13 14l-1.41 1.41L14 18h2l3-3h2v-2l3-3v-2h-2L17 5.24C14.73 3 11.16 2.5 7.11 3.59 3.96 4.42 1.5 7.46 1.5 11c0 2.49 1.01 4.73 2.64 6.36l1.41-1.41C4.41 14.83 3.73 13.48 3.73 12c0-2.76 2.24-5 5-5s5 2.24 5 5h-2c0-1.66-1.34-3-3-3s-3 1.34-3 3 1.34 3 3 3h1v2z"/>
            </svg>
            <input type="password" placeholder="Пароль" id="password">
        </div>

        <!-- Login Button -->
        <button class="login-button" onclick="login()">Войти</button>

        <!-- Optional: Links -->
        <div class="links">
            <a href="#">Забыли пароль?</a>
            <a href="#">Создать аккаунт</a>
        </div>
    </div>

    <script>
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!username || !password) {
                alert('Пожалуйста, заполните все поля');
                return;
            }

            // Add your authentication logic here
            console.log('Username:', username);
            console.log('Password:', password);

            // Redirect after successful login
            // window.location.href = 'chat.html';
        }

        // Enter key support
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
