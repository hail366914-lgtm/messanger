<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            /* Основной фон страницы — глубокий темно-серый */
            background-color: #181818;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: #ffffff; /* Базовый цвет текста — белый */
        }

        .messenger {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            /* Фон самого приложения — чуть светлее фона страницы */
            background-color: #202020;
            position: relative;
        }

        /* ===== Верхняя тёмная шапка ===== */
        .header {
            background-color: #111111; /* Почти черный */
            height: 60px;
            flex-shrink: 0;
        }

        /* ===== Поиск ===== */
        .search-container {
            display: flex;
            justify-content: center;
            padding: 20px 40px 24px;
        }

        .search-box {
            display: flex;
            align-items: center;
            /* Фон поля поиска — темно-серый, отличный от фона страницы */
            background-color: #2c2c2c;
            border-radius: 24px;
            padding: 12px 24px;
            width: 100%;
            max-width: 600px;
            gap: 12px;
            border: 1px solid #3a3a3a; /* Тонкая рамка для выделения */
        }

        .search-box svg {
            flex-shrink: 0;
            /* Цвет иконки лупы — светло-серый */
            stroke: #a0a0a0;
        }

        .search-box input {
            border: none;
            background: transparent;
            outline: none;
            font-size: 16px;
            /* Цвет текста при вводе */
            color: #e0e0e0;
            width: 100%;
        }

        .search-box input::placeholder {
            /* Цвет плейсхолдера "Поиск" */
            color: #707070;
        }

        /* ===== Список чатов ===== */
        .chat-list {
            flex: 1;
            padding: 0 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .chat-item {
            display: flex;
            align-items: center;
            /* Карточки чатов — темно-серый, самый светлый элемент в иерархии */
            background-color: #383838;
            border-radius: 16px;
            padding: 18px 24px;
            gap: 18px;
            cursor: pointer;
            transition: background-color 0.2s;
            border: 1px solid #444;
        }

        .chat-item:hover {
            background-color: #454545;
        }

        /* Аватар-заглушка */
        .avatar {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            /* Аватар серый, но светлее карточки */
            background-color: #555555;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar svg {
            opacity: 0.9;
            fill: #cccccc;
        }

        /* ===== Нижняя панель с иконками ===== */
        .bottom-bar {
            display: flex;
            justify-content: center;
            gap: 60px;
            align-items: center;
            padding: 24px 0 16px;
            flex-shrink: 0;
            background-color: #202020;
        }

        .bottom-bar .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            transition: background-color 0.2s;
        }

        .bottom-bar .icon-btn:hover {
            background-color: #333333;
        }

        .bottom-bar .icon-btn svg {
            /* Цвет иконок внизу — белый */
            stroke: #ffffff;
        }

        /* ===== Нижняя тёмная полоса ===== */
        .footer {
            background-color: #111111;
            height: 50px;
            flex-shrink: 0;
        }

        /* ===== Адаптивность ===== */
        @media (max-width: 768px) {
            body {
                background-color: #181818;
            }

            .search-container {
                padding: 16px 20px 20px;
            }

            .search-box {
                max-width: 100%;
                padding: 10px 18px;
            }

            .chat-list {
                padding: 0 20px 20px;
                max-width: 100%;
            }

            .chat-item {
                padding: 14px 18px;
            }

            .avatar {
                width: 48px;
                height: 48px;
            }

            .bottom-bar {
                gap: 40px;
            }
        }
    </style>
</head>
<body>

<div class="messenger">

    <!-- Верхняя тёмная шапка -->
    <div class="header"></div>

    <!-- Поиск -->
    <div class="search-container">
        <div class="search-box">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" placeholder="Поиск">
        </div>
    </div>

    <!-- Список чатов -->
    <div class="chat-list">

        <div class="chat-item">
            <div class="avatar">
                <svg width="32" height="32" viewBox="0 0 24 24">
                    <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0
                             2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"/>
                </svg>
            </div>
        </div>

        <div class="chat-item">
            <div class="avatar">
                <svg width="32" height="32" viewBox="0 0 24 24">
                    <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0
                             2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"/>
                </svg>
            </div>
        </div>

        <div class="chat-item">
            <div class="avatar">
                <svg width="32" height="32" viewBox="0 0 24 24">
                    <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0
                             2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"/>
                </svg>
            </div>
        </div>

        <div class="chat-item">
            <div class="avatar">
                <svg width="32" height="32" viewBox="0 0 24 24">
                    <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0
                             2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"/>
                </svg>
            </div>
        </div>

    </div>

    <!-- Нижняя панель -->
    <div class="bottom-bar">

        <!-- Иконка настроек -->
        <button class="icon-btn" aria-label="Настройки">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0
                        1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33
                        1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65
                        1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2
                        2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0
                        4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1
                        0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0
                        0-.33-1.82l-.06-.06a2 2 0 1 1
                        2.83-2.83l.06.06A1.65 1.65 0 0 0
                        9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0
                        0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51
                        1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0
                        1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0
                        19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0
                        0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
        </button>

        <!-- Иконка сообщений -->
        <button class="icon-btn" aria-label="Сообщения">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none"
                 stroke-width="2" stroke-linecap="round"
                 stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1
                        2-2h14a2 2 0 0 1 2 2z"/>
                <circle cx="9" cy="12" r="0.6" fill="#fff"/>
                <circle cx="12" cy="12" r="0.6" fill="#fff"/>
                <circle cx="15" cy="12" r="0.6" fill="#fff"/>
            </svg>
        </button>

    </div>

    <!-- Нижняя тёмная полоса -->
    <div class="footer"></div>

</div>

</body>
</html>
