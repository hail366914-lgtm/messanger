<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hail - Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background-color: #2d2d2d;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #3d3d3d;
        }

        .back-button {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
        }

        .profile-icon {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background-color: #4a4a4a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-icon svg {
            width: 20px;
            height: 20px;
            fill: #888;
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Messages */
        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 20px;
            position: relative;
            word-wrap: break-word;
        }

        .message.received {
            background-color: #3d3d3d;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }

        .message.sent {
            background-color: #8b5cf6;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .message-text {
            font-size: 16px;
            line-height: 1.4;
            margin-bottom: 4px;
        }

        .message-time {
            font-size: 12px;
            opacity: 0.7;
            text-align: right;
        }

        /* Input Area */
        .input-area {
            background-color: #2d2d2d;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-top: 1px solid #3d3d3d;
        }

        .attach-button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
        }

        .attach-button svg {
            width: 24px;
            height: 24px;
            stroke: #ffffff;
            stroke-width: 2;
            fill: none;
        }

        .message-input {
            flex: 1;
            background-color: #3d3d3d;
            border: none;
            border-radius: 25px;
            padding: 12px 20px;
            color: #ffffff;
            font-size: 16px;
            outline: none;
        }

        .message-input::placeholder {
            color: #888;
        }

        /* Scrollbar */
        .chat-container::-webkit-scrollbar {
            width: 8px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: #4a4a4a;
            border-radius: 4px;
        }

        .chat-container::-webkit-scrollbar-thumb:hover {
            background: #5a5a5a;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <button class="back-button">&lt;</button>
        <div class="header-title">Hail</div>
        <div class="profile-icon">
            <svg viewBox="0 0 24 24">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
        </div>
    </div>

    <!-- Chat Container -->
    <div class="chat-container">
        <!-- Received Message -->
        <div class="message received">
            <div class="message-text">Привет!</div>
            <div class="message-time">9:11</div>
        </div>

        <!-- Sent Messages -->
        <div class="message sent">
            <div class="message-text">Привет!</div>
            <div class="message-time">9:11</div>
        </div>

        <div class="message sent">
            <div class="message-text">Кд?</div>
            <div class="message-time">9:11</div>
        </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
        <button class="attach-button">
            <svg viewBox="0 0 24 24">
                <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5a2.5 2.5 0 0 1 5 0v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5a2.5 2.5 0 0 0 5 0V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/>
            </svg>
        </button>
        <input type="text" class="message-input" placeholder="Написать">
    </div>
</body>
</html>
